<!DOCTYPE html>
<html lang="en">
<head>

    <title>Bedroom Tile Collection | Sabian Stones</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --dark-bg: #121212; --text-light: #F5F5F5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-light); padding-top: 100px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 4%; background: rgba(18, 18, 18, 0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 16px; font-weight: 600; }
        .logo h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 22px; letter-spacing: 2px; }
        .page-title { text-align: center; font-family: 'Cinzel', serif; color: var(--gold); margin: 40px 0 20px 0; font-size: 28px; letter-spacing: 2px; }
        .vertical-gallery { max-width: 800px; margin: 0 auto; padding: 0 20px 80px 20px; }
        .product-item { background: #1a1a1a; border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 8px; margin-bottom: 50px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .product-item img { width: 100%; height: auto; max-height: 500px; object-fit: cover; display: block; }
        .product-details { padding: 25px; text-align: center; }
        .product-details h4 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 20px; margin-bottom: 10px; }
        .order-btn { display: inline-block; margin-top: 15px; padding: 12px 35px; background: #25D366; color: #fff; text-decoration: none; font-weight: 600; border-radius: 4px; font-size: 15px; transition: 0.3s; }
        .order-btn i { margin-right: 8px; }
        .order-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body>

    <header>
